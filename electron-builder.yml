productName: Echo Infer Desktop
appId: xyz.builtbyecho.echo-infer-desktop
asar: true
asarUnpack:
  - "**\\*.{node,dll}"
  - "**/node_modules/libsql/**"
files:
  - "dist"
  # - "!dist/**/*.map"
  # - "!dist/**/stats.html"
  - "node_modules"
  - "!node_modules/@types"
  - "!node_modules/undici-types"
  - "package.json"

beforePack: .erb/scripts/ensure-app-deps.cjs
afterSign: .erb/scripts/notarize.js
afterPack: .erb/scripts/patch-libsql.cjs

# releaseInfo:
#   releaseNotes: See the changelog for details

mac:
  notarize: false
  category: public.app-category.developer-tools
  target:
    target: default
    arch:
      - arm64
      - x64
  type: distribution
  hardenedRuntime: true
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  verifyUpdateCodeSignature: false
  artifactName: ${productName}-${version}-Setup.${ext}
  # Echo release signing is not configured yet; local test builds are unsigned.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: assets/installer.nsh

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Development
  artifactName: ${productName}-${version}-${arch}.${ext}

directories:
  app: release/app
  buildResources: assets
  output: release/build

extraResources:
  - ./assets/**

publish:
  - provider: s3
    bucket: echo-infer-desktop
    # TODO: configure Echo Infer Desktop auto-update publishing before release.
    endpoint: https://example.invalid
    path: /releases
    channel: latest
